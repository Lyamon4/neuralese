name: Deploy Neuralese Landing

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create deploy marker
        run: |
          cat > ./dist/deploy-meta.json <<EOF
          {
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.BEGET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Beget VPS
        run: |
          rsync -az --delete --itemize-changes ./dist/ \
            ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:/var/www/neuralese/

      - name: Fix permissions and reload nginx
        run: |
          ssh ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }} '
            chown -R www-data:www-data /var/www/neuralese &&
            find /var/www/neuralese -type d -exec chmod 755 {} \; &&
            find /var/www/neuralese -type f -exec chmod 644 {} \; &&
            nginx -t &&
            systemctl reload nginx
          '

      - name: Verify live domain serves this commit
        run: |
          sleep 2
          curl -fsS https://neuralese.asia/deploy-meta.json
          curl -fsS https://neuralese.asia/deploy-meta.json | grep "${GITHUB_SHA}"