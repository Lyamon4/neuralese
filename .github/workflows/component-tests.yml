name: Portable component tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  block-editor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/block-editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/block-editor/package-lock.json
      - run: npm ci
      - run: npm run test -- --run
      - run: npm run build

  landing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/landing/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  onprem-runtime:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: runtime/onnx-training/code-snapshot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: runtime/onnx-training/code-snapshot/onprem_runtime/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r runtime/onnx-training/code-snapshot/onprem_runtime/requirements.txt
      - run: python -m pytest runtime/onnx-training/code-snapshot/tests/onprem_runtime -q

  clean-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python smoke_test.py
